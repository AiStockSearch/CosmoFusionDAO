name: Dev Security Check

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - dev
    types: [opened, synchronize, reopened]

jobs:
  dev-security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities (dev)
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=critical

      - name: Run npm audit (dev)
        run: npm audit --audit-level=critical || echo "Critical vulnerabilities found"

      - name: Run yarn audit (dev)
        run: yarn audit --level critical || echo "Critical vulnerabilities found"

  dev-dependency-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies in dev..."
          yarn outdated || echo "Some dependencies are outdated"

      - name: Check for unused dependencies
        run: |
          echo "Checking for unused dependencies..."
          npx depcheck || echo "Some dependencies might be unused" 