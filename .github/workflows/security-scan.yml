name: Security Scan

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
    types: [opened, synchronize, reopened]

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: Run Snyk to check for license issues
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --license-check

      - name: Run Snyk to check for code vulnerabilities
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --code

      - name: Upload Snyk results to GitHub Security tab
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --sarif-file-output=snyk.sarif

      - name: Upload SARIF file
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif

  dependency-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run npm audit
        run: npm audit --audit-level=high

      - name: Run yarn audit
        run: yarn audit --level high

      - name: Check for outdated dependencies
        run: |
          echo "Checking for outdated dependencies..."
          yarn outdated || echo "Some dependencies are outdated"

  code-quality-security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run ESLint security rules
        run: |
          npx eslint src/ --ext .ts,.tsx --config .eslintrc.cjs --max-warnings 0 || echo "ESLint security issues found"

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          grep -r "password\|secret\|token\|key" src/ --exclude-dir=node_modules --exclude="*.test.*" --exclude="*.spec.*" || echo "No obvious hardcoded secrets found"

      - name: Check for console.log statements
        run: |
          echo "Checking for console.log statements..."
          grep -r "console\.log" src/ --exclude-dir=node_modules --exclude="*.test.*" --exclude="*.spec.*" || echo "No console.log statements found"

      - name: Check for eval() usage
        run: |
          echo "Checking for eval() usage..."
          grep -r "eval(" src/ --exclude-dir=node_modules --exclude="*.test.*" --exclude="*.spec.*" || echo "No eval() usage found"

      - name: Check for innerHTML usage
        run: |
          echo "Checking for innerHTML usage..."
          grep -r "innerHTML" src/ --exclude-dir=node_modules --exclude="*.test.*" --exclude="*.spec.*" || echo "No innerHTML usage found"

  dependency-vulnerability-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'CosmoFusion DAO Web'
          path: '.'
          format: 'HTML'
          out: 'reports'

      - name: Upload dependency check results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: reports/

  secrets-scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run TruffleHog
        run: |
          pip install truffleHog
          truffleHog --json . > trufflehog-results.json || echo "TruffleHog scan completed"

      - name: Upload TruffleHog results
        uses: actions/upload-artifact@v4
        with:
          name: trufflehog-results
          path: trufflehog-results.json

  container-scan:
    runs-on: ubuntu-latest
    if: hashFiles('Dockerfile') != ''
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'cosmofusion-dao-web:latest'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  notify-security-issues:
    runs-on: ubuntu-latest
    needs: [security-scan, dependency-check, code-quality-security, dependency-vulnerability-scan, secrets-scan]
    if: failure()
    
    steps:
      - name: Notify security issues
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#security'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }} 